<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management - SKC OMS</title>

    <link rel="stylesheet" href="../css/dashboard.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="dashboard">

    <aside class="sidebar">

        <div class="logo">
            <h2>SKC OMS</h2>
            <p>Task Management</p>
        </div>

        <ul class="menu">
            <li onclick="location.href='owner-dashboard.html'">Dashboard</li>
            <li onclick="location.href='employees.html'">Employees</li>
            <li onclick="location.href='attendance.html'">Attendance</li>
            <li class="active">Tasks</li>
        </ul>

    </aside>

    <main class="content">

        <header class="topbar">

            <div class="top-left">
                <h2>Task Management</h2>
            </div>

            <div class="top-right">
                <span id="userName"></span>

                <button onclick="logout()">
                    Logout
                </button>
            </div>

        </header>

        <section class="panel">

            <h3>Create New Task</h3>

            <br>

            <form id="taskForm">

                <input
                    type="text"
                    id="title"
                    placeholder="Task Title"
                    required
                    style="width:100%;padding:12px;margin-bottom:10px;"
                >

                <textarea
                    id="description"
                    placeholder="Task Description"
                    style="width:100%;height:120px;padding:12px;margin-bottom:10px;"
                ></textarea>

                <select
                    id="assignedTo"
                    required
                    style="width:100%;padding:12px;margin-bottom:10px;"
                >
                    <option value="">
                        Select Employee
                    </option>
                </select>

                <select
                    id="priority"
                    required
                    style="width:100%;padding:12px;margin-bottom:10px;"
                >
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                    <option value="Critical">Critical</option>
                </select>

                <input
                    type="date"
                    id="dueDate"
                    required
                    style="width:100%;padding:12px;margin-bottom:10px;"
                >

                <button type="submit">
                    Create Task
                </button>

            </form>

        </section>

        <br>

        <section class="panel">

            <h3>Task List</h3>

            <br>

            <table width="100%">

                <thead>

                <tr>
                    <th align="left">Title</th>
                    <th align="left">Assigned To</th>
                    <th align="left">Priority</th>
                    <th align="left">Due Date</th>
                    <th align="left">Status</th>
                    <th align="left">Action</th>
                </tr>

                </thead>

                <tbody id="taskTable">

                <tr>
                    <td colspan="6">
                        Loading Tasks...
                    </td>
                </tr>

                </tbody>

            </table>

        </section>

    </main>

</div>

<script src="../js/supabase.js"></script>
<script src="../js/common.js"></script>
<script src="../js/tasks.js"></script>

</body>
</html>
